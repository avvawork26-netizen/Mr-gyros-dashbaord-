<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mr. Gyros">
<meta name="theme-color" content="#c8370d">
<title>Mr. Gyros — Kitchen Orders</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0d0806;
    --surface:  #150f0a;
    --surface2: #1e1510;
    --border:   #2e1f14;
    --accent:   #c8370d;
    --accent2:  #e05c1a;
    --gold:     #d4913a;
    --green:    #5ecf7a;
    --text:     #f2e8de;
    --muted:    #7a6558;
    --new-glow: rgba(200,55,13,0.2);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    background: linear-gradient(135deg, #1a0d07 0%, #0f0806 100%);
    border-bottom: 2px solid var(--accent);
    padding: 0 24px;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 32px rgba(200,55,13,0.2);
  }

  .logo-wrap { display: flex; align-items: center; gap: 12px; }
  .logo-icon  { font-size: 1.8rem; }
  .logo       { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 900; color: var(--text); }
  .logo em    { font-style: italic; color: var(--accent2); }
  .logo-sub   { font-family: 'DM Mono', monospace; font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--gold); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 14px; }

  .live-badge {
    display: flex; align-items: center; gap: 6px;
    font-family: 'DM Mono', monospace; font-size: 0.65rem;
    color: var(--green); text-transform: uppercase; letter-spacing: 0.1em;
    background: rgba(94,207,122,0.08); border: 1px solid rgba(94,207,122,0.22);
    padding: 5px 11px; border-radius: 20px;
  }

  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 1.6s infinite; }

  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:0.5; transform:scale(0.85); }
  }

  .clock { font-family: 'DM Mono', monospace; font-size: 0.85rem; color: var(--muted); }

  .flame-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--gold), var(--accent2), var(--accent));
    background-size: 200% 100%;
    animation: shimmer 3s linear infinite;
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .stats-bar { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
  .stat { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 12px 8px; border-right: 1px solid var(--border); gap: 2px; }
  .stat:last-child { border-right: none; }
  .stat strong { font-family: 'Playfair Display', serif; font-size: 1.7rem; font-weight: 700; color: var(--accent2); line-height: 1; }
  .stat span   { font-family: 'DM Mono', monospace; font-size: 0.59rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }

  .board { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; align-items: start; }

  .order-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; animation: slideIn 0.38s cubic-bezier(0.34,1.4,0.64,1); position: relative; }

  @keyframes slideIn {
    from { opacity:0; transform:translateY(22px) scale(0.96); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }

  .order-card.is-new { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 8px 40px var(--new-glow); }
  .order-card.is-new::after { content: 'NEW'; position: absolute; top: 12px; right: 12px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.12em; padding: 3px 9px; border-radius: 20px; }
  .order-card.is-done { opacity: 0.38; filter: grayscale(0.4); }

  .card-stripe { height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .order-card.is-done .card-stripe { background: var(--border); }

  .card-top { padding: 14px 16px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 12px; }
  .order-number { font-family: 'Playfair Display', serif; font-size: 2.7rem; font-weight: 900; line-height: 1; color: var(--accent); min-width: 50px; text-align: center; text-shadow: 0 2px 16px rgba(200,55,13,0.4); }
  .card-meta { flex: 1; min-width: 0; }
  .customer-name { font-size: 1rem; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase; letter-spacing: 0.05em; }
  .order-time { font-family: 'DM Mono', monospace; font-size: 0.64rem; color: var(--muted); margin-top: 3px; }

  .card-items { padding: 12px 16px; }
  .item-row { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .item-row:last-child { border-bottom: none; }
  .item-qty { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--gold); background: rgba(212,145,58,0.1); border-radius: 4px; padding: 1px 6px; min-width: 26px; text-align: center; }
  .item-name { font-size: 0.9rem; color: var(--text); line-height: 1.4; }

  .card-notes { margin: 0 16px 12px; background: rgba(200,55,13,0.08); border: 1px solid rgba(200,55,13,0.28); border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; padding: 9px 12px; }
  .notes-label { font-family: 'DM Mono', monospace; font-size: 0.56rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent2); margin-bottom: 3px; }
  .notes-text  { font-size: 0.82rem; color: #e8a080; line-height: 1.45; }

  .card-actions { padding: 0 16px 14px; display: flex; gap: 8px; }
  .btn { flex: 1; padding: 11px; border-radius: 8px; border: none; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 0.07em; transition: all 0.15s; }
  .btn-seen    { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .btn-seen:hover { background: var(--border); color: var(--text); }
  .btn-done    { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; box-shadow: 0 4px 14px rgba(200,55,13,0.3); }
  .btn-done:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-restore { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); font-size: 0.76rem; }

  .section-label { grid-column: 1 / -1; font-family: 'DM Mono', monospace; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.18em; color: var(--muted); padding: 4px 0 10px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }

  .empty-state { grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; gap: 14px; }
  .empty-icon { font-size: 3.5rem; opacity: 0.2; }
  .empty-state h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; color: var(--muted); font-style: italic; }
  .empty-state p  { font-family: 'DM Mono', monospace; font-size: 0.7rem; text-align: center; max-width: 240px; color: var(--muted); opacity: 0.6; }

  .toast-container { position: fixed; bottom: 24px; right: 16px; display: flex; flex-direction: column; gap: 10px; z-index: 999; }
  .toast { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 0.85rem; padding: 12px 20px; border-radius: 12px; animation: toastIn 0.35s cubic-bezier(0.34,1.4,0.64,1), toastOut 0.3s ease 2.7s forwards; box-shadow: 0 8px 28px rgba(200,55,13,0.4); }
  @keyframes toastIn { from { opacity:0; transform:translateY(16px) scale(0.93); } to { opacity:1; transform:translateY(0) scale(1); } }
  @keyframes toastOut { to { opacity:0; transform:translateY(6px); } }
</style>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getDatabase, ref, onChildAdded } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  const app = initializeApp({ databaseURL: 'https://mrgyros-21fc6-default-rtdb.firebaseio.com' });
  const db  = getDatabase(app);

  let orderCounter = 1, orders = [], doneIds = new Set();
  let isFirstLoad = true;
  setTimeout(() => { isFirstLoad = false; }, 3000);

  function updateClock() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
  }
  setInterval(updateClock, 1000); updateClock();

  function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    document.getElementById('toasts').appendChild(t);
    setTimeout(() => t.remove(), 3100);
  }

  function beep() {
    try {
      const ctx = new AudioContext();
      [0, 130].forEach(delay => {
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = delay === 0 ? 740 : 920;
        const t = ctx.currentTime + delay/1000;
        gain.gain.setValueAtTime(0.25, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.38);
        osc.start(t); osc.stop(t + 0.38);
      });
    } catch(e) {}
  }

  function updateStats() {
    document.getElementById('stat-active').textContent = orders.filter(o => !o.done).length;
    document.getElementById('stat-done').textContent   = orders.filter(o => o.done).length;
    document.getElementById('stat-total').textContent  = orders.length;
  }

  function parseItems(raw) {
    if (!raw) return [];
    if (Array.isArray(raw)) {
      return raw.map(item => typeof item === 'object' && item.item_name
        ? { name: item.item_name, qty: item.quantity || 1 }
        : { name: String(item), qty: 1 });
    }
    return String(raw).split(/[\n,]+/).map(s => {
      const m = s.trim().match(/^(\d+)[x\s]+(.+)/i);
      return m ? { qty: m[1], name: m[2] } : { qty: 1, name: s.trim() };
    }).filter(i => i.name);
  }

  function renderCard(order) {
    const items = parseItems(order.order_items);
    const hasNotes = order.special_instructions && String(order.special_instructions).trim();
    const itemsHtml = items.map(i => `<div class="item-row"><span class="item-qty">×${i.qty}</span><span class="item-name">${i.name}</span></div>`).join('');
    const notesHtml = hasNotes ? `<div class="card-notes"><div class="notes-label">⚠ Special Instructions</div><div class="notes-text">${order.special_instructions}</div></div>` : '';
    const cls = order.done ? 'is-done' : order.seen ? '' : 'is-new';
    const actions = order.done
      ? `<button class="btn btn-restore" onclick="restoreOrder('${order.id}')">↩ Restore</button>`
      : `<button class="btn btn-seen" onclick="markSeen('${order.id}')">👁 Seen</button><button class="btn btn-done" onclick="markDone('${order.id}')">✓ Done</button>`;
    return `<div class="order-card ${cls}" id="card-${order.id}"><div class="card-stripe"></div><div class="card-top"><div class="order-number">${order.number}</div><div class="card-meta"><div class="customer-name">${order.customer_name}</div><div class="order-time">📞 ${order.time}</div></div></div><div class="card-items">${itemsHtml}</div>${notesHtml}<div class="card-actions">${actions}</div></div>`;
  }

  function renderAll() {
    const board = document.getElementById('board');
    const active = orders.filter(o => !o.done);
    const done   = orders.filter(o => o.done);
    if (!orders.length) {
      board.innerHTML = `<div class="empty-state"><div class="empty-icon">🥙</div><h2>No orders yet</h2><p>Waiting for calls... Orders appear here instantly.</p></div>`;
      updateStats(); return;
    }
    let html = '';
    if (active.length) html += `<div class="section-label">🔴 Active — ${active.length}</div>` + active.map(renderCard).join('');
    if (done.length)   html += `<div class="section-label">✅ Completed — ${done.length}</div>` + done.map(renderCard).join('');
    board.innerHTML = html;
    updateStats();
  }

  window.markSeen     = id => { const o = orders.find(x=>x.id===id); if(o){ o.seen=true; renderAll(); } };
  window.markDone     = id => { const o = orders.find(x=>x.id===id); if(o){ o.done=true; doneIds.add(id); renderAll(); showToast(`Order #${o.number} complete ✓`); } };
  window.restoreOrder = id => { const o = orders.find(x=>x.id===id); if(o){ o.done=false; doneIds.delete(id); renderAll(); } };

  renderAll();

  onChildAdded(ref(db, 'orders'), snapshot => {
    const val = snapshot.val(), key = snapshot.key;
    if (orders.find(o => o.id === key)) return;
    const order = {
      id: key, number: orderCounter++,
      customer_name: val.customer_name || 'Guest',
      order_items: val.order_items || [],
      special_instructions: val.special_instructions || '',
      time: new Date().toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' }),
      seen: false, done: doneIds.has(key),
    };
    orders.unshift(order);
    renderAll();
    if (!isFirstLoad) { beep(); showToast(`🔔 New order — ${order.customer_name}`); }
  });
</script>
</head>
<body>
<header>
  <div class="logo-wrap">
    <div class="logo-icon">🥙</div>
    <div>
      <div class="logo">Mr. <em>Gyros</em></div>
      <div class="logo-sub">Kitchen Display</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div>Live</div>
    <div class="clock" id="clock">--:--</div>
  </div>
</header>
<div class="flame-bar"></div>
<div class="stats-bar">
  <div class="stat"><strong id="stat-active">0</strong><span>Active</span></div>
  <div class="stat"><strong id="stat-done">0</strong><span>Done</span></div>
  <div class="stat"><strong id="stat-total">0</strong><span>Today</span></div>
</div>
<div class="board" id="board"></div>
<div class="toast-container" id="toasts"></div>
</body>
</html>
