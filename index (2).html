<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mr. Gyros">
<meta name="theme-color" content="#c8370d">
<title>Mr. Gyros — Kitchen Orders</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0d0806;
    --surface:  #150f0a;
    --surface2: #1e1510;
    --border:   #2e1f14;
    --accent:   #c8370d;
    --accent2:  #e05c1a;
    --gold:     #d4913a;
    --green:    #5ecf7a;
    --yellow:   #f5c842;
    --text:     #f2e8de;
    --muted:    #7a6558;
    --new-glow: rgba(200,55,13,0.2);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    background: linear-gradient(135deg, #1a0d07 0%, #0f0806 100%);
    border-bottom: 2px solid var(--accent);
    padding: 0 24px;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 32px rgba(200,55,13,0.2);
  }

  .logo-wrap { display: flex; align-items: center; gap: 12px; }
  .logo-icon  { font-size: 1.8rem; }
  .logo       { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 900; color: var(--text); }
  .logo em    { font-style: italic; color: var(--accent2); }
  .logo-sub   { font-family: 'DM Mono', monospace; font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--gold); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 12px; }

  .conn-badge {
    display: flex; align-items: center; gap: 6px;
    font-family: 'DM Mono', monospace; font-size: 0.62rem;
    text-transform: uppercase; letter-spacing: 0.1em;
    padding: 4px 10px; border-radius: 20px;
    transition: all 0.3s;
  }
  .conn-badge.connected    { color: var(--green); background: rgba(94,207,122,0.08); border: 1px solid rgba(94,207,122,0.22); }
  .conn-badge.disconnected { color: #ff6b6b; background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.3); }

  .conn-dot { width: 6px; height: 6px; border-radius: 50%; }
  .connected .conn-dot    { background: var(--green); animation: pulse 1.6s infinite; }
  .disconnected .conn-dot { background: #ff6b6b; }

  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:0.5; transform:scale(0.85); }
  }

  .clock { font-family: 'DM Mono', monospace; font-size: 0.85rem; color: var(--muted); }

  .flame-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--gold), var(--accent2), var(--accent));
    background-size: 200% 100%;
    animation: shimmer 3s linear infinite;
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .stats-bar { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
  .stat { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 11px 8px; border-right: 1px solid var(--border); gap: 2px; }
  .stat:last-child { border-right: none; }
  .stat strong { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; color: var(--accent2); line-height: 1; }
  .stat span   { font-family: 'DM Mono', monospace; font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }

  .date-bar {
    background: var(--surface2); border-bottom: 1px solid var(--border);
    padding: 7px 24px; display: flex; justify-content: space-between; align-items: center;
  }
  .date-label { font-family: 'DM Mono', monospace; font-size: 0.66rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }

  .add-manual-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 0.62rem; padding: 4px 10px;
    border-radius: 6px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.08em;
    transition: all 0.15s;
  }
  .add-manual-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* MANUAL ORDER MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    z-index: 500; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 24px; width: 100%; max-width: 420px;
  }
  .modal h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--text); margin-bottom: 16px; }
  .modal input, .modal textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    padding: 10px 12px; border-radius: 8px; margin-bottom: 10px; outline: none;
  }
  .modal input:focus, .modal textarea:focus { border-color: var(--accent2); }
  .modal textarea { resize: vertical; min-height: 80px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 6px; }
  .modal-cancel { flex: 1; padding: 10px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600; }
  .modal-submit { flex: 2; padding: 10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 700; }

  .board { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; align-items: start; }

  .order-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
    animation: slideIn 0.38s cubic-bezier(0.34,1.4,0.64,1);
    position: relative; transition: opacity 0.3s;
  }

  @keyframes slideIn {
    from { opacity:0; transform:translateY(22px) scale(0.96); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }

  /* NEW — just arrived, unseen */
  .order-card.is-new { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 8px 40px var(--new-glow); }
  .order-card.is-new::after { content: 'NEW'; position: absolute; top: 12px; right: 12px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.12em; padding: 3px 9px; border-radius: 20px; }

  /* COOKING — seen, in progress */
  .order-card.is-cooking { border-color: var(--yellow); box-shadow: 0 0 0 1px rgba(245,200,66,0.4); }
  .order-card.is-cooking::after { content: '🔥 COOKING'; position: absolute; top: 12px; right: 12px; background: rgba(245,200,66,0.15); border: 1px solid var(--yellow); color: var(--yellow); font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.1em; padding: 3px 9px; border-radius: 20px; }

  /* DONE */
  .order-card.is-done { opacity: 0.42; filter: grayscale(0.3); }

  .card-stripe { height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .order-card.is-cooking .card-stripe { background: linear-gradient(90deg, var(--yellow), var(--gold)); }
  .order-card.is-done .card-stripe    { background: var(--green); opacity: 0.5; }

  .card-top { padding: 14px 16px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 12px; }
  .order-number { font-family: 'Playfair Display', serif; font-size: 2.7rem; font-weight: 900; line-height: 1; color: var(--accent); min-width: 50px; text-align: center; text-shadow: 0 2px 16px rgba(200,55,13,0.4); }
  .order-card.is-cooking .order-number { color: var(--yellow); text-shadow: 0 2px 16px rgba(245,200,66,0.3); }
  .order-card.is-done .order-number    { color: var(--green); text-shadow: none; font-size: 2rem; }

  .card-meta { flex: 1; min-width: 0; }
  .customer-name { font-size: 1rem; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase; letter-spacing: 0.05em; }

  .order-time-row { display: flex; align-items: center; gap: 8px; margin-top: 3px; }
  .order-time { font-family: 'DM Mono', monospace; font-size: 0.64rem; color: var(--muted); }
  .order-age  { font-family: 'DM Mono', monospace; font-size: 0.6rem; padding: 1px 6px; border-radius: 4px; }
  .age-fresh  { background: rgba(94,207,122,0.12); color: var(--green); }
  .age-mid    { background: rgba(245,200,66,0.12); color: var(--yellow); }
  .age-old    { background: rgba(200,55,13,0.15); color: var(--accent2); }

  .card-items { padding: 12px 16px; }
  .item-row { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .item-row:last-child { border-bottom: none; }
  .item-qty  { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--gold); background: rgba(212,145,58,0.1); border-radius: 4px; padding: 1px 6px; min-width: 26px; text-align: center; }
  .item-name { font-size: 0.9rem; color: var(--text); line-height: 1.4; }

  .card-notes { margin: 0 16px 12px; background: rgba(200,55,13,0.08); border: 1px solid rgba(200,55,13,0.28); border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; padding: 9px 12px; }
  .notes-label { font-family: 'DM Mono', monospace; font-size: 0.56rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent2); margin-bottom: 3px; }
  .notes-text  { font-size: 0.82rem; color: #e8a080; line-height: 1.45; }

  .card-actions { padding: 0 16px 14px; display: flex; gap: 8px; flex-wrap: wrap; }
  .btn { flex: 1; min-width: 80px; padding: 10px; border-radius: 8px; border: none; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 0.06em; transition: all 0.15s; }
  .btn-cooking { background: rgba(245,200,66,0.12); color: var(--yellow); border: 1px solid rgba(245,200,66,0.3); }
  .btn-cooking:hover { background: rgba(245,200,66,0.2); }
  .btn-done    { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; box-shadow: 0 4px 14px rgba(200,55,13,0.3); }
  .btn-done:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-restore { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); font-size: 0.74rem; }

  .section-label { grid-column: 1 / -1; font-family: 'DM Mono', monospace; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.18em; color: var(--muted); padding: 4px 0 10px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }

  .empty-state { grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; gap: 14px; }
  .empty-icon { font-size: 3.5rem; opacity: 0.2; }
  .empty-state h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; color: var(--muted); font-style: italic; }
  .empty-state p  { font-family: 'DM Mono', monospace; font-size: 0.7rem; text-align: center; max-width: 240px; color: var(--muted); opacity: 0.6; }

  .toast-container { position: fixed; bottom: 24px; right: 16px; display: flex; flex-direction: column; gap: 10px; z-index: 999; max-width: 300px; }
  .toast { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 0.85rem; padding: 12px 20px; border-radius: 12px; animation: toastIn 0.35s cubic-bezier(0.34,1.4,0.64,1), toastOut 0.3s ease 2.7s forwards; box-shadow: 0 8px 28px rgba(200,55,13,0.4); }
  .toast.warn { background: linear-gradient(135deg, #b34a00, #8a2000); }
  @keyframes toastIn { from { opacity:0; transform:translateY(16px) scale(0.93); } to { opacity:1; transform:translateY(0) scale(1); } }
  @keyframes toastOut { to { opacity:0; transform:translateY(6px); } }

  @media (max-width: 600px) {
    .board { padding: 12px; gap: 12px; }
    header { padding: 0 14px; }
    .date-bar { padding: 7px 14px; }
  }
</style>

<script type="module">
  import { initializeApp }          from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getDatabase, ref, onChildAdded, update, push, serverTimestamp }
                                    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  const app = initializeApp({ databaseURL: 'https://mrgyros-21fc6-default-rtdb.firebaseio.com' });
  const db  = getDatabase(app);

  // ── HELPERS ──
  const getTodayKey = () => new Date().toISOString().split('T')[0];

  let orderCounter = 1;
  let orders       = [];
  let isFirstLoad  = true;
  let audioUnlocked = false;
  let connected    = false;

  // Unlock audio on first tap (mobile requirement)
  document.addEventListener('touchstart', () => { audioUnlocked = true; }, { once: true });
  document.addEventListener('click',      () => { audioUnlocked = true; }, { once: true });

  setTimeout(() => { isFirstLoad = false; }, 4000);

  // ── CLOCK ──
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
    document.getElementById('date-label').textContent =
      now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ── AGE TIMER — updates every minute ──
  setInterval(renderAll, 60000);

  // ── MIDNIGHT RESET ──
  function scheduleMidnightReset() {
    const now  = new Date();
    const next = new Date(); next.setHours(24,0,5,0);
    setTimeout(() => {
      orders = []; orderCounter = 1; renderAll();
      scheduleMidnightReset();
    }, next - now);
  }
  scheduleMidnightReset();

  // ── CONNECTION STATUS ──
  function setConnected(val) {
    connected = val;
    const badge = document.getElementById('conn-badge');
    badge.className = 'conn-badge ' + (val ? 'connected' : 'disconnected');
    badge.querySelector('.conn-text').textContent = val ? 'Live' : 'Offline';
    if (!val) showToast('⚠ Lost connection — reconnecting...', true);
  }

  // ── TOAST ──
  function showToast(msg, warn = false) {
    const t = document.createElement('div');
    t.className = 'toast' + (warn ? ' warn' : '');
    t.textContent = msg;
    document.getElementById('toasts').appendChild(t);
    setTimeout(() => t.remove(), 3200);
  }

  // ── BEEP ──
  function beep() {
    if (!audioUnlocked) return;
    try {
      const ctx = new AudioContext();
      [0, 140].forEach(delay => {
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = delay === 0 ? 740 : 920;
        const t = ctx.currentTime + delay/1000;
        gain.gain.setValueAtTime(0.28, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
        osc.start(t); osc.stop(t + 0.4);
      });
    } catch(e) {}
  }

  // ── STATS ──
  function updateStats() {
    document.getElementById('stat-active').textContent  = orders.filter(o => !o.done && !o.cooking).length;
    document.getElementById('stat-cooking').textContent = orders.filter(o => o.cooking && !o.done).length;
    document.getElementById('stat-done').textContent    = orders.filter(o => o.done).length;
    document.getElementById('stat-total').textContent   = orders.length;
  }

  // ── AGE LABEL ──
  function ageLabel(placedTs) {
    if (!placedTs) return '';
    const mins = Math.floor((Date.now() - placedTs) / 60000);
    if (mins < 5)  return '<span class="order-age age-fresh">just now</span>';
    if (mins < 15) return `<span class="order-age age-mid">${mins}m ago</span>`;
    return `<span class="order-age age-old">⚠ ${mins}m ago</span>`;
  }

  // ── PARSE ITEMS ──
  function parseItems(raw) {
    if (!raw) return [];
    if (Array.isArray(raw)) {
      return raw.map(item => typeof item === 'object' && item.item_name
        ? { name: item.item_name, qty: item.quantity || 1 }
        : { name: String(item), qty: 1 });
    }
    return String(raw).split(/[\n,]+/).map(s => {
      const m = s.trim().match(/^(\d+)[x\s]+(.+)/i);
      return m ? { qty: m[1], name: m[2] } : { qty: 1, name: s.trim() };
    }).filter(i => i.name);
  }

  // ── RENDER CARD ──
  function renderCard(order) {
    const items    = parseItems(order.order_items);
    const hasNotes = order.special_instructions && String(order.special_instructions).trim();

    const itemsHtml = items.map(i =>
      `<div class="item-row"><span class="item-qty">×${i.qty}</span><span class="item-name">${i.name}</span></div>`
    ).join('');

    const notesHtml = hasNotes
      ? `<div class="card-notes"><div class="notes-label">⚠ Special Instructions</div><div class="notes-text">${order.special_instructions}</div></div>`
      : '';

    const cls = order.done ? 'is-done' : order.cooking ? 'is-cooking' : 'is-new';

    const numDisplay = order.done ? '✓' : order.number;

    const actions = order.done
      ? `<button class="btn btn-restore" onclick="restoreOrder('${order.id}')">↩ Restore</button>`
      : order.cooking
        ? `<button class="btn btn-done" onclick="markDone('${order.id}')">✓ Done</button>`
        : `<button class="btn btn-cooking" onclick="markCooking('${order.id}')">🔥 Cooking</button>
           <button class="btn btn-done" onclick="markDone('${order.id}')">✓ Done</button>`;

    return `
      <div class="order-card ${cls}" id="card-${order.id}">
        <div class="card-stripe"></div>
        <div class="card-top">
          <div class="order-number">${numDisplay}</div>
          <div class="card-meta">
            <div class="customer-name">${order.customer_name}</div>
            <div class="order-time-row">
              <span class="order-time">📞 ${order.time}</span>
              ${ageLabel(order.placedAt)}
            </div>
          </div>
        </div>
        <div class="card-items">${itemsHtml}</div>
        ${notesHtml}
        <div class="card-actions">${actions}</div>
      </div>`;
  }

  // ── RENDER ALL ──
  function renderAll() {
    const board   = document.getElementById('board');
    const newOrds = orders.filter(o => !o.done && !o.cooking);
    const cooking = orders.filter(o => o.cooking && !o.done);
    const done    = orders.filter(o => o.done);

    if (!orders.length) {
      board.innerHTML = `<div class="empty-state"><div class="empty-icon">🥙</div><h2>No orders yet</h2><p>Waiting for calls... Orders appear here instantly.</p></div>`;
      updateStats(); return;
    }

    let html = '';
    if (newOrds.length) html += `<div class="section-label">🔴 New Orders — ${newOrds.length}</div>` + newOrds.map(renderCard).join('');
    if (cooking.length) html += `<div class="section-label">🔥 Cooking — ${cooking.length}</div>`    + cooking.map(renderCard).join('');
    if (!newOrds.length && !cooking.length) html += `<div class="empty-state"><div class="empty-icon">✅</div><h2>All caught up!</h2><p>No active orders right now.</p></div>`;
    if (done.length)    html += `<div class="section-label">✅ Completed Today — ${done.length}</div>` + done.map(renderCard).join('');

    board.innerHTML = html;
    updateStats();
  }

  // ── ACTIONS ──
  window.markCooking = async id => {
    const o = orders.find(x => x.id === id);
    if (!o) return;
    o.cooking = true;
    await update(ref(db, `orders/${id}`), { cooking: true });
    renderAll();
  };

  window.markDone = async id => {
    const o = orders.find(x => x.id === id);
    if (!o) return;
    o.done = true; o.cooking = false; o.doneAt = Date.now();
    await update(ref(db, `orders/${id}`), { done: true, cooking: false, doneAt: o.doneAt });
    renderAll();
    showToast(`Order #${o.number} complete ✓`);
  };

  window.restoreOrder = async id => {
    const o = orders.find(x => x.id === id);
    if (!o) return;
    o.done = false; o.cooking = false;
    await update(ref(db, `orders/${id}`), { done: false, cooking: false, doneAt: null });
    renderAll();
  };

  // ── MANUAL ORDER ──
  window.openManual = () => document.getElementById('manual-modal').classList.add('show');
  window.closeManual = () => {
    document.getElementById('manual-modal').classList.remove('show');
    document.getElementById('manual-name').value = '';
    document.getElementById('manual-items').value = '';
    document.getElementById('manual-notes').value = '';
  };

  window.submitManual = async () => {
    const name  = document.getElementById('manual-name').value.trim();
    const items = document.getElementById('manual-items').value.trim();
    const notes = document.getElementById('manual-notes').value.trim();
    if (!name || !items) { showToast('⚠ Name and items required', true); return; }
    const todayKey = getTodayKey();
    await push(ref(db, 'orders'), {
      customer_name: name,
      order_items: items.split('\n').filter(Boolean),
      special_instructions: notes,
      timestamp: Date.now(),
      date: todayKey,
      manual: true,
    });
    closeManual();
    showToast(`Manual order added for ${name}`);
  };

  // ── FIREBASE LISTENER ──
  renderAll();
  setConnected(false);

  const todayKey = getTodayKey();

  onChildAdded(ref(db, 'orders'), snapshot => {
    setConnected(true);
    const val = snapshot.val();
    const key = snapshot.key;

    if (orders.find(o => o.id === key)) return;

    // Today-only filter
    const orderDate = val.date || null;
    if (orderDate && orderDate !== todayKey) return;
    if (!orderDate && val.timestamp) {
      const d = new Date(val.timestamp).toISOString().split('T')[0];
      if (d !== todayKey) return;
    }

    const placedAt = val.timestamp || Date.now();

    const order = {
      id: key,
      number: orderCounter++,
      customer_name: val.customer_name || 'Guest',
      order_items: val.order_items || [],
      special_instructions: val.special_instructions || '',
      time: new Date(placedAt).toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' }),
      placedAt,
      cooking: val.cooking || false,
      done:    val.done    || false,
      doneAt:  val.doneAt  || null,
      manual:  val.manual  || false,
    };

    orders.push(order);
    orders.sort((a, b) => (a.placedAt || 0) - (b.placedAt || 0));
    renderAll();

    if (!isFirstLoad && !order.done) {
      beep();
      showToast(`🔔 New order — ${order.customer_name}${order.manual ? ' (manual)' : ''}`);
    }
  }, error => {
    setConnected(false);
    console.error('Firebase error:', error);
  });

  // Connection heartbeat
  setInterval(() => {
    if (connected) return;
    // Re-attempt by checking if we have recent data
  }, 10000);
</script>
</head>
<body>

<!-- MANUAL ORDER MODAL -->
<div class="modal-overlay" id="manual-modal">
  <div class="modal">
    <h3>➕ Add Manual Order</h3>
    <input id="manual-name" type="text" placeholder="Customer name" />

</body>
